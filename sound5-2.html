<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Boss B：聲控粒子宇宙</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.10.0/addons/p5.sound.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #startButton { position: absolute; padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 8px; z-index: 10; color: #fff; background-color: #333; }
  </style>
</head>
<body>
<button id="startButton">點擊播放音樂</button>

<script>
  let song, analyzer, fft;
  let isPlaying = false;
  let particles = []; // 用來裝所有粒子的陣列

  function preload() { song = loadSound('music.mp3'); }

  function setup() {
    createCanvas(windowWidth, windowHeight);
    analyzer = new p5.Amplitude();
    analyzer.setInput(song);
    fft = new p5.FFT();

    let btn = document.getElementById('startButton');
    btn.addEventListener('click', function() {
      userStartAudio(); song.play(); isPlaying = true; btn.style.display = 'none'; 
    });
  }

  function draw() {
    // 帶有透明度的背景，創造粒子殘影 (Trail Effect)
    background(0, 0, 0, 40); 

    if (isPlaying) {
      let vol = analyzer.getLevel();
      fft.analyze();
      let bass = fft.getEnergy("bass");

      // 音量控制全體粒子的速度加成
      let speedMultiplier = map(vol, 0, 0.5, 1, 10, true);

      // --- 節拍觸發爆發 ---
      // 當低音突破 210，瞬間噴發 30 顆彩色粒子
      if (bass > 210) {
        for (let i = 0; i < 30; i++) {
          particles.push(new Particle(true)); // true 代表它是爆發型的彩色粒子
        }
      }

      // 平常每幀固定產生 2 顆白色基礎粒子
      particles.push(new Particle(false)); 

      // 讓所有的粒子更新並顯示在畫面上
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(speedMultiplier);
        particles[i].show();
        
        // 如果粒子跑出畫面，就把它從陣列中刪除，節省效能
        if (particles[i].edges()) {
          particles.splice(i, 1);
        }
      }
    }
  }

  // AI 幫我們寫好的粒子「設計圖 (Class)」
  class Particle {
    constructor(isBurst) {
      this.pos = createVector(width / 2, height / 2); // 從中心出發
      // 給予隨機的發射角度與力道
      this.vel = p5.Vector.random2D().mult(random(1, 4)); 
      this.isBurst = isBurst;
      
      // 如果是重低音爆發的粒子，給它隨機亮色；否則是白色
      if (this.isBurst) {
        this.color = color(random(100,255), random(100,255), random(100,255));
        this.size = random(4, 10);
      } else {
        this.color = color(255);
        this.size = random(1, 3);
      }
    }

    update(speedMultiplier) {
      // 粒子的移動速度受到音樂音量的加成控制！
      let currentVel = this.vel.copy().mult(speedMultiplier);
      this.pos.add(currentVel);
    }

    show() {
      noStroke();
      fill(this.color);
      circle(this.pos.x, this.pos.y, this.size);
    }

    edges() {
      // 判斷粒子是否超出了螢幕邊界
      if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
        return true;
      }
      return false;
    }
  }

  function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
